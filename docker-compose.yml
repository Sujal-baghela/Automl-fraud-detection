# ══════════════════════════════════════════════════════════════════
# docker-compose.yml  —  LOCAL DEVELOPMENT
#
# Services:
#   fraud      →  http://localhost:8501   (Fraud Detection)
#   universal  →  http://localhost:8502   (Universal Trainer)
#
# Usage:
#   docker compose up --build            # start both
#   docker compose up fraud              # fraud only
#   docker compose up universal          # universal only
# ══════════════════════════════════════════════════════════════════

services:

  # ── Fraud Detection (local only, never on HF) ────────────────────
  fraud:
    build:
      context: .
      dockerfile: Dockerfile.local

    container_name: automl-x-fraud

    ports:
      - "8501:8501"

    volumes:
      - ./models:/app/models
      - ./Data:/app/Data
      - ./reports:/app/reports
      - ./logs:/app/logs
      - ./src:/app/src

    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1

    command: >
      streamlit run app_fraud_local.py
        --server.port=8501
        --server.address=0.0.0.0
        --server.headless=true
        --server.maxUploadSize=2048
        --browser.gatherUsageStats=false
        --server.fileWatcherType=auto

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Universal Trainer (mirrors HF Space) ─────────────────────────
  universal:
    build:
      context: .
      dockerfile: Dockerfile.local

    container_name: automl-x-universal

    ports:
      - "8502:8502"

    volumes:
      - ./models:/app/models
      - ./Data:/app/Data
      - ./reports:/app/reports
      - ./logs:/app/logs
      - ./src:/app/src

    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1

    command: >
      streamlit run app_universal.py
        --server.port=8502
        --server.address=0.0.0.0
        --server.headless=true
        --server.maxUploadSize=2048
        --browser.gatherUsageStats=false
        --server.fileWatcherType=auto

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8502/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s